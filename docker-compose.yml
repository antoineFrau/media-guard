services:
  postgres:
    image: postgres:16-alpine
    container_name: mediaguard-postgres
    environment:
      POSTGRES_USER: mediaguard
      POSTGRES_PASSWORD: mediaguard
      POSTGRES_DB: mediaguard
    ports:
      - "5432:5432"
    volumes:
      - mediaguard_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediaguard -d mediaguard"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  mediaguard_postgres_data:
