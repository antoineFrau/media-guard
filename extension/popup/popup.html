<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header>
      <h1>MediaGuard</h1>
      <a id="settings-link" href="#" class="settings-link">Settings</a>
    </header>

    <div id="not-youtube" class="panel hidden">
      <p>Open a YouTube video to identify rhetorical techniques and fact checks.</p>
    </div>

    <div id="youtube-panel" class="panel hidden">
      <div id="video-status" class="status-area"></div>

      <div id="capture-section" class="section hidden">
        <p class="hint">No captions available. Capture tab audio for transcription.</p>
        <button id="capture-btn">Capture audio</button>
      </div>

      <div id="analysis-section" class="section hidden">
        <div id="insights-list" class="insights-list"></div>
      </div>

      <div id="empty-state" class="empty-state hidden">
        <p>Analysis loads automatically when you open a video. Capture audio if there are no captions.</p>
      </div>
    </div>

    <div id="loading" class="panel">
      <p class="muted">Loading…</p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
