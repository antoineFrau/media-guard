<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <h1>MediaGuard</h1>
    <p class="subtitle">Video analysis overlays for YouTube</p>

    <div class="field">
      <label for="mistral-key">Mistral API Key (BYOK)</label>
      <input type="password" id="mistral-key" placeholder="Enter your Mistral API key">
      <span class="hint">Required for analysis. Never stored on our servers.</span>
    </div>

    <div class="field">
      <label for="api-url">API Base URL</label>
      <input type="url" id="api-url" placeholder="http://localhost:3000">
      <span class="hint">Optional. Default: MediaGuard API.</span>
    </div>

    <div class="field">
      <label>STT provider (audio capture)</label>
      <span class="provider-toggle">
        <label><input type="radio" name="stt-provider" value="elevenlabs" checked> ElevenLabs</label>
        <label><input type="radio" name="stt-provider" value="mistral"> Mistral Voxtral</label>
      </span>
      <span class="hint">When video has no captions. Mistral uses your Mistral key.</span>
    </div>

    <div class="field">
      <label for="elevenlabs-key">ElevenLabs API Key</label>
      <input type="password" id="elevenlabs-key" placeholder="Optional — uses server key if empty">
      <span class="hint">Only for ElevenLabs STT. Mistral uses Mistral key above.</span>
    </div>

    <button id="save-btn">Save</button>
    <span id="status" class="status"></span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
